name: Build Artifact

on:
  workflow_dispatch:  # 手动触发
  pull_request:
    branches:
      - master
    paths:
      - 'src/**'
      - '.github/workflows/build-artifact.yml'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.419
      
      - name: Restore dotnet tools
        run: dotnet tool restore
      
      - name: Restore solution
        run: dotnet restore SnakeGame.sln
      
      - name: Build solution
        run: dotnet build SnakeGame.sln -c Release --no-restore -p:UseSharedCompilation=false -m:1
      
      - name: Test SnakeGame.Core
        run: dotnet test tests/SnakeGame.Core.Tests/SnakeGame.Core.Tests.csproj -c Release --no-build -p:UseSharedCompilation=false -m:1
      
      - name: Publish Windows x64
        run: |
          # 发布到临时文件夹
          dotnet publish src/SnakeGame.App/SnakeGame.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishReadyToRun=true `
            -o publish/win-clean
          
          # 删除可能不完整的 Content 目录，然后复制完整的
          $contentSrc = "src/SnakeGame.App/Content/bin/Windows/Content"
          $contentDest = "publish/win-clean/Content"
          if (Test-Path $contentDest) {
            Remove-Item -Path $contentDest -Recurse -Force
            Write-Host "Removed incomplete Content directory"
          }
          if (Test-Path $contentSrc) {
            Copy-Item -Path $contentSrc -Destination $contentDest -Recurse -Force
            Write-Host "Copied complete Content directory from $contentSrc"
            Get-ChildItem $contentDest -Recurse -Filter "*.xnb" | Measure-Object | Select-Object Count
          }
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnakeGame-Windows-x64
          path: publish/win-clean/*
          retention-days: 30
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-microhei fonts-liberation
          sudo fc-cache -fv
      
      - name: Use Linux font
        run: |
          cp src/SnakeGame.App/Content/UIFont-Linux.spritefont src/SnakeGame.App/Content/UIFont.spritefont
      
      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.419
      
      - name: Restore dotnet tools
        run: dotnet tool restore
      
      - name: Restore solution
        run: dotnet restore SnakeGame.sln
      
      - name: Build solution
        run: dotnet build SnakeGame.sln -c Release --no-restore -p:UseSharedCompilation=false -m:1
      
      - name: Test SnakeGame.Core
        run: dotnet test tests/SnakeGame.Core.Tests/SnakeGame.Core.Tests.csproj -c Release --no-build -p:UseSharedCompilation=false -m:1
      
      - name: Publish Linux x64
        run: |
          # 发布到输出目录
          dotnet publish src/SnakeGame.App/SnakeGame.App.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:PublishReadyToRun=true \
            -o publish/linux-clean
          
          # 删除可能不完整的 Content 目录，然后复制完整的
          contentSrc="src/SnakeGame.App/Content/bin/DesktopGL/Content"
          contentDest="publish/linux-clean/Content"
          if [ -d "$contentDest" ]; then
            rm -rf "$contentDest"
            echo "Removed incomplete Content directory"
          fi
          if [ -d "$contentSrc" ]; then
            cp -r "$contentSrc" "$contentDest"
            echo "Copied complete Content directory"
            find "$contentDest" -name "*.xnb" | wc -l
          fi
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnakeGame-Linux-x64
          path: publish/linux-clean/*
          retention-days: 30
          if-no-files-found: error

  build-summary:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SnakeGame-Windows-x64
          path: ./windows
      
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: SnakeGame-Linux-x64
          path: ./linux
      
      - name: List artifacts
        run: |
          echo "## 📦 构建产物"
          echo ""
          echo "| 平台 | 文件数 | 大小 |"
          echo "|------|--------|------|"
          echo "| Windows x64 | $(find ./windows -type f | wc -l) | $(du -sh ./windows | cut -f1) |"
          echo "| Linux x64 | $(find ./linux -type f | wc -l) | $(du -sh ./linux | cut -f1) |"
          echo ""
          echo "### 下载方式"
          echo "1. 点击本页面顶部的 'Artifacts' 按钮"
          echo "2. 选择对应平台的包下载"
          echo "3. 解压后即可运行"
          echo ""
          echo "### 运行说明"
          echo "**Windows**:"
          echo '```'
          echo "./SnakeGame.App.exe"
          echo '```'
          echo ""
          echo "**Linux**:"
          echo '```'
          echo "chmod +x SnakeGame.App"
          echo "./SnakeGame.App"
          echo '```'
        shell: bash
