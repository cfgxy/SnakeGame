name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: SnakeGame
  RID: win-x64
  PUBLISH_DIR: artifacts/publish/win-x64
  RELEASE_NOTES_PATH: artifacts/release-notes.md

jobs:
  publish-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.419

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Restore solution
        run: dotnet restore SnakeGame.sln

      - name: Build solution
        run: dotnet build SnakeGame.sln -c Release --no-restore -p:UseSharedCompilation=false -m:1

      - name: Test SnakeGame.Core
        run: dotnet test tests/SnakeGame.Core.Tests/SnakeGame.Core.Tests.csproj -c Release --no-build -p:UseSharedCompilation=false -m:1

      - name: Restore app publish dependencies
        run: dotnet restore src/SnakeGame.App/SnakeGame.App.csproj -r ${{ env.RID }}

      - name: Publish app
        run: dotnet publish src/SnakeGame.App/SnakeGame.App.csproj -c Release -r ${{ env.RID }} --self-contained false --no-restore -p:UseSharedCompilation=false -o ${{ env.PUBLISH_DIR }}
      
      - name: Copy Content
        run: |
          $contentSrc = "src/SnakeGame.App/Content/Content"
          $contentDest = "${{ env.PUBLISH_DIR }}/Content"
          if (Test-Path $contentSrc) {
            Copy-Item -Path $contentSrc -Destination $contentDest -Recurse -Force
          }

      - name: Archive release package and checksum
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $packageName = "${{ env.APP_NAME }}-$tag-${{ env.RID }}.zip"
          $checksumName = "${{ env.APP_NAME }}-$tag-${{ env.RID }}.sha256"
          $zipPath = Join-Path "artifacts" $packageName
          $checksumPath = Join-Path "artifacts" $checksumName

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          if (Test-Path $checksumPath) {
            Remove-Item $checksumPath -Force
          }

          Compress-Archive -Path "${{ env.PUBLISH_DIR }}/*" -DestinationPath $zipPath

          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path $checksumPath -Value "$hash  $packageName" -Encoding utf8

          "package_name=$packageName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "package_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "checksum_name=$checksumName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "checksum_path=$checksumPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Render release notes
        shell: pwsh
        run: |
          $notes = Get-Content ".github/release-notes-template.md" -Raw -Encoding utf8
          $notes = $notes.Replace("__VERSION__", "${{ github.ref_name }}")
          $notes = $notes.Replace("__PACKAGE_NAME__", "${{ steps.package.outputs.package_name }}")
          $notes = $notes.Replace("__CHECKSUM_NAME__", "${{ steps.package.outputs.checksum_name }}")

          New-Item -ItemType Directory -Path "artifacts" -Force | Out-Null
          Set-Content -Path "${{ env.RELEASE_NOTES_PATH }}" -Value $notes -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ env.RELEASE_NOTES_PATH }}
          append_body: true
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.package.outputs.package_path }}
            ${{ steps.package.outputs.checksum_path }}
