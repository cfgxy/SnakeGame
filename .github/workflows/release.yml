name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Restore project dependencies for win-x64
        run: dotnet restore SnakeGame.sln -r win-x64

      - name: Build solution
        run: dotnet build SnakeGame.sln -c Release -p:UseSharedCompilation=false -m:1

      - name: Test SnakeGame.Core
        run: dotnet test tests/SnakeGame.Core.Tests/SnakeGame.Core.Tests.csproj -c Release --no-build -p:UseSharedCompilation=false -m:1

      - name: Publish app
        run: dotnet publish src/SnakeGame.App/SnakeGame.App.csproj -c Release -r win-x64 --self-contained false --no-restore -p:UseSharedCompilation=false -o artifacts/publish/win-x64

      - name: Archive release package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipPath = "artifacts/SnakeGame-$tag-win-x64.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path artifacts/publish/win-x64/* -DestinationPath $zipPath

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/SnakeGame-${{ github.ref_name }}-win-x64.zip
