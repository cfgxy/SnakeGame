name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.419

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Restore solution
        run: dotnet restore SnakeGame.sln

      - name: Build solution
        run: dotnet build SnakeGame.sln -c Release --no-restore -p:UseSharedCompilation=false -m:1

      - name: Test SnakeGame.Core
        run: dotnet test tests/SnakeGame.Core.Tests/SnakeGame.Core.Tests.csproj -c Release --no-build -p:UseSharedCompilation=false -m:1

      - name: Publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet publish src/SnakeGame.App/SnakeGame.App.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          mkdir -p artifacts/linux
          cp src/SnakeGame.App/bin/Release/net8.0/linux-x64/publish/SnakeGame.App artifacts/linux/

      - name: Publish (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dotnet publish src/SnakeGame.App/SnakeGame.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          mkdir -p artifacts/windows
          cp src/SnakeGame.App/bin/Release/net8.0/win-x64/publish/SnakeGame.App.exe artifacts/windows/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SnakeGame-${{ matrix.os }}
          path: artifacts/
          retention-days: 14
